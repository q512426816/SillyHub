# Full-stack compose: db + redis + backend + frontend.
# Used by ``make up`` and by the AC-01 acceptance test.
name: multi-agent-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 128m

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      # 宿主机预构建的 daemon 分发物（install.sh + sillyhub-daemon.js）；
      # 部署前需 cd sillyhub-daemon && pnpm bundle 产出 build/bundle/。
      additional_contexts:
        daemon: ../sillyhub-daemon
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.158}
        # 空 → 取最新 sillyspec；填值 → pin。
        SILLYSPEC_VERSION: ${SILLYSPEC_VERSION:-}
        # Git SHA baked into the image; export COMMIT_SHA before `up --build`.
        COMMIT_SHA: ${COMMIT_SHA:-}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount host project directories so the scanner can read .sillyspec trees.
      # Adjust the left side to match your local path.
      - ${HOST_PROJECTS_DIR:-C:/Users/qinyi/IdeaProjects}:/host-projects
      - worktree-data:/data/sillyspec-workspaces
      # spec-workspaces: bind mount so the host daemon (Windows) and the backend
      # container share the same physical directory; otherwise the agent cannot
      # see spec documents written by the backend. Override host path via
      # SPEC_DATA_HOST_DIR in .env (see deploy/.env.example).
      - "${SPEC_DATA_HOST_DIR:-C:/data/spec-workspaces}:/data/spec-workspaces"
      - claude-data:/app/.claude
    environment:
      # Prefix that rewrites host-style paths into container mount paths.
      HOST_PATH_PREFIX: ${HOST_PATH_PREFIX:-C:/Users/qinyi/IdeaProjects}
      CONTAINER_PATH_PREFIX: /host-projects
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?must set SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3001","http://127.0.0.1:3001"]}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-}
      COMMIT_SHA: ${COMMIT_SHA:-}
      PLATFORM_BOOTSTRAP_ADMIN_EMAIL: ${PLATFORM_BOOTSTRAP_ADMIN_EMAIL:-}
      PLATFORM_BOOTSTRAP_ADMIN_PASSWORD: ${PLATFORM_BOOTSTRAP_ADMIN_PASSWORD:-}
      PLATFORM_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${PLATFORM_BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      SILLYSPEC_MASTER_KEY: ${SILLYSPEC_MASTER_KEY:?must set SILLYSPEC_MASTER_KEY}
      WORKTREE_BASE_DIR: /data/sillyspec-workspaces
      SPEC_DATA_ROOT: /data/spec-workspaces
      HOME: /app
      NPM_CONFIG_CACHE: /tmp/.npm
      # Claude Code agent configuration is loaded from deploy/.env via env_file
      # so host-level ANTHROPIC_* variables do not override the Docker settings.
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # Run migrations before serving so a fresh stack always lands on head.
    command:
      - sh
      - -c
      # --ws-max-size 100MB：spec import 的 get_spec_bundle RPC 把 tar+base64 单帧回传，
      # 默认 16MiB 上限会被 >12MB 的 spec 目录撑爆（WS close 1009 致 import 必断）。
      # 治本在 daemon 端 gzip 压缩，这里是防御性兜底。
      - "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --ws-max-size 104857600"
    mem_limit: 800m

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-}
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    mem_limit: 400m

volumes:
  pgdata:
  redisdata:
  worktree-data:
  claude-data:
