# Full-stack compose: db + redis + backend + frontend.
# Used by ``make up`` and by the AC-01 acceptance test.
name: multi-agent-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount host project directories so the scanner can read .sillyspec trees.
      # Adjust the left side to match your local path.
      - ${HOST_PROJECTS_DIR:-C:/Users/qinyi/IdeaProjects}:/host-projects
      - worktree-data:/data/sillyspec-workspaces
      - spec-data:/data/spec-workspaces
    environment:
      # Prefix that rewrites host-style paths into container mount paths.
      HOST_PATH_PREFIX: ${HOST_PATH_PREFIX:-C:/Users/qinyi/IdeaProjects}
      CONTAINER_PATH_PREFIX: /host-projects
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platform}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?must set SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:3000"]}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-}
      COMMIT_SHA: ${COMMIT_SHA:-}
      PLATFORM_BOOTSTRAP_ADMIN_EMAIL: ${PLATFORM_BOOTSTRAP_ADMIN_EMAIL:-}
      PLATFORM_BOOTSTRAP_ADMIN_PASSWORD: ${PLATFORM_BOOTSTRAP_ADMIN_PASSWORD:-}
      PLATFORM_BOOTSTRAP_ADMIN_DISPLAY_NAME: ${PLATFORM_BOOTSTRAP_ADMIN_DISPLAY_NAME:-}
      SILLYSPEC_MASTER_KEY: ${SILLYSPEC_MASTER_KEY:?must set SILLYSPEC_MASTER_KEY}
      WORKTREE_BASE_DIR: /data/sillyspec-workspaces
      SPEC_DATA_ROOT: /data/spec-workspaces
      # Claude Code agent configuration
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://open.bigmodel.cn/api/anthropic}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-glm-5}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-glm-5.1}
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # Run migrations before serving so a fresh stack always lands on head.
    command:
      - sh
      - -c
      - "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_COMMIT_SHA: ${NEXT_PUBLIC_COMMIT_SHA:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
  redisdata:
  spec-data:
  worktree-data:
